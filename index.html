<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib Das | LinkedIn Style</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Fira Sans", Ubuntu, Oxygen, "Oxygen Sans", Cantarell, "Droid Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Lucida Grande", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f2ee; /* LinkedIn's signature gray background */
            color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            padding: 40px 10px;
        }

        .profile-card {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 4px 4px rgba(0,0,0,0.02);
        }

        .cover-photo {
            height: 120px;
            background: linear-gradient(to right, #a0b4b7, #d9e2e1); /* Placeholder for a cover image */
            position: relative;
        }

        .profile-header {
            padding: 0 24px 24px;
            position: relative;
        }

        .avatar-container {
            width: 130px;
            height: 130px;
            background: white;
            border-radius: 50%;
            padding: 4px;
            position: absolute;
            top: -65px;
            left: 24px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e0e0e0;
        }

        .info {
            margin-top: 75px;
            text-align: left;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .headline {
            font-size: 1rem;
            color: rgba(0, 0, 0, 0.6);
            margin-top: 4px;
            line-height: 1.4;
        }

        .location {
            font-size: 0.85rem;
            color: rgba(0, 0, 0, 0.6);
            margin-top: 8px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            border-bottom: 1px solid #ebebeb;
            padding-bottom: 20px;
        }

        .btn-primary {
            background-color: #0a66c2;
            color: white;
            padding: 6px 16px;
            border-radius: 1600px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-outline {
            color: #0a66c2;
            border: 1px solid #0a66c2;
            padding: 6px 16px;
            border-radius: 1600px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .section-title {
            padding: 24px 24px 8px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .link-list {
            padding: 0 24px 24px;
        }

        .link-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .link-item:last-child {
            border-bottom: none;
        }

        .link-icon {
            width: 48px;
            height: 48px;
            background: #f3f4f6;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            color: #666;
        }

        .link-text h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .link-text p {
            font-size: 0.85rem;
            color: rgba(0, 0, 0, 0.6);
        }

        .link-item:hover .link-text h3 {
            color: #0a66c2;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="cover-photo"></div>
        
        <div class="profile-header">
            <div class="avatar-container">
                <div class="avatar">
                    <i data-lucide="user" size="64" color="#666"></i>
                </div>
            </div>
            
            <div class="info">
                <h1>Parthib Das</h1>
                <p class="headline">Web Developer | Administrator | Tech Enthusiast</p>
                <p class="location">Dhaka Division, Bangladesh</p>
                
                <div class="action-buttons">
                    <a href="https://www.facebook.com/parthibdas2023" class="btn-primary" target="_blank">Connect</a>
                    <a href="http://linktr.ee/parthibdas" class="btn-outline" target="_blank">View Portfolio</a>
                </div>
            </div>
        </div>

        <h2 class="section-title">Resources & Links</h2>
        <div class="link-list">
            <a href="https://youtube.com/@parthib_2023" class="link-item" target="_blank">
                <div class="link-icon"><i data-lucide="play-circle"></i></div>
                <div class="link-text">
                    <h3>YouTube Channel</h3>
                    <p>Tutorials and Tech Updates</p>
                </div>
            </a>
            
            <a href="http://linktr.ee/parthibdas" class="link-item" target="_blank">
                <div class="link-icon"><i data-lucide="external-link"></i></div>
                <div class="link-text">
                    <h3>Linktree</h3>
                    <p>All my professional links in one place</p>
                </div>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
