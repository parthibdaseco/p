<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib Das | Profile</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0a66c2;
            --bg: #f4f2ee;
            --card-white: #ffffff;
            --text-dark: #1d1d1d;
            --text-grey: #666666;
            --border: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 580px;
        }

        .profile-card {
            background: var(--card-white);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        .banner {
            height: 140px;
            background: linear-gradient(to right, #acb6e5, #86fde8);
        }

        .content-padding {
            padding: 0 24px 24px 24px;
        }

        /* Fixed Avatar Positioning */
        .avatar-container {
            margin-top: -70px;
            margin-bottom: 16px;
        }

        .avatar-circle {
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 50%;
            padding: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .placeholder-icon {
            background: #f3f4f6;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .bio {
            font-size: 1rem;
            color: var(--text-grey);
            margin-top: 4px;
            line-height: 1.4;
        }

        /* Button Styling with Icons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.2s ease;
        }

        .btn-message {
            background-color: var(--primary);
            color: white;
        }

        .btn-message:hover {
            background-color: #004182;
        }

        .btn-connect {
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-connect:hover {
            background-color: rgba(10, 102, 194, 0.1);
        }

        /* Links List */
        .links-list {
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .link-row {
            display: flex;
            align-items: center;
            padding: 12px;
            text-decoration: none;
            color: var(--text-dark);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .link-row:hover {
            background: #f9f9f9;
        }

        .link-icon {
            margin-right: 15px;
            color: var(--text-grey);
        }

        .link-row b {
            font-size: 1rem;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="profile-card">
            <div class="banner"></div>
            
            <div class="content-padding">
                <div class="avatar-container">
                    <div class="avatar-circle">
                        <div class="placeholder-icon">
                            <i data-lucide="user" size="60" color="#adb5bd"></i>
                        </div>
                    </div>
                </div>

                <h1>Parthib Das</h1>
                <p class="bio">Freelancer | Administrator | Influencer </p>

                <div class="button-group">
                    <a href="https://wa.me/8801406903532" class="btn btn-message">
                        <i data-lucide="message-circle" size="18"></i>
                        Message
                    </a>
                    
                    <a href="https://www.facebook.com/parthibdas2023" class="btn btn-connect">
                        <i data-lucide="facebook" size="18"></i>
                        Connect
                    </a>
                </div>

                <div class="links-list">
                    <a href="https://youtube.com/@parthib_2023" class="link-row" target="_blank">
                        <i data-lucide="youtube" class="link-icon"></i>
                        <b>YouTube Channel</b>
                    </a>
                    <a href="https://instagram.com/parthib_2023" class="link-row" target="_blank">
                        <i data-lucide="instagram" class="link-icon"></i>
                        <b>Instagram</b>
                    </a>
                    <a href="https://x.com/parthib_2023" class="link-row" target="_blank">
                        <i data-lucide="twitter" class="link-icon"></i>
                        <b>X Profile</b>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
