<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib Das | Links</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #f9fafb;
            color: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 40px 24px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: #f3f4f6;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e5e7eb;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .bio {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 32px;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            text-decoration: none;
            color: #374151;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background: #f8fafc;
            border-color: #3b82f6;
            color: #3b82f6;
            transform: translateX(4px);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
            color: currentColor;
        }

        .arrow-icon {
            opacity: 0.3;
        }

        .footer {
            margin-top: 32px;
            font-size: 0.75rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">
            <i data-lucide="user" size="40" stroke-width="1.5"></i>
        </div>
        
        <h1>Parthib Das</h1>
        <p class="bio">Web Developer & School Administrator</p>

        <div class="links-list">
            <a href="http://linktr.ee/parthibdas" class="link-item" target="_blank">
                <div class="link-content">
                    <span class="icon-box"><i data-lucide="link"></i></span>
                    <span>Linktree Portfolio</span>
                </div>
                <i data-lucide="external-link" size="16" class="arrow-icon"></i>
            </a>

            <a href="https://www.facebook.com/parthibdas2023" class="link-item" target="_blank">
                <div class="link-content">
                    <span class="icon-box"><i data-lucide="facebook"></i></span>
                    <span>Facebook</span>
                </div>
                <i data-lucide="external-link" size="16" class="arrow-icon"></i>
            </a>

            <a href="https://youtube.com/@parthib_2023?si=7mWVg_vYrWx7DwJA" class="link-item" target="_blank">
                <div class="link-content">
                    <span class="icon-box"><i data-lucide="youtube"></i></span>
                    <span>YouTube Channel</span>
                </div>
                <i data-lucide="external-link" size="16" class="arrow-icon"></i>
            </a>
        </div>

        <p class="footer">© 2026</p>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
