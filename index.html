<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib Das</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 30px;
        }

        .content {
            width: 100%;
            max-width: 480px;
        }

        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 16px;
        }

        .description {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.6;
            max-width: 320px;
        }

        .links-grid {
            display: grid;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            background: #f4f4f4;
            border-radius: 16px;
            text-decoration: none;
            color: #000;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link-card:hover {
            background: #000;
            color: #fff;
            transform: scale(1.02);
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .footer {
            margin-top: 64px;
            font-size: 0.8rem;
            color: #999;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="content">
        <header>
            <h1>Parthib Das</h1>
            <p class="description">Web Developer & School Administrator building digital solutions.</p>
        </header>

        <div class="links-grid">
            <a href="http://linktr.ee/parthibdas" class="link-card" target="_blank">
                <div class="brand-info">
                    <i data-lucide="layout"></i>
                    <span class="brand-name">Portfolio</span>
                </div>
                <i data-lucide="arrow-up-right" size="20"></i>
            </a>

            <a href="https://youtube.com/@parthib_2023" class="link-card" target="_blank">
                <div class="brand-info">
                    <i data-lucide="youtube"></i>
                    <span class="brand-name">YouTube</span>
                </div>
                <i data-lucide="arrow-up-right" size="20"></i>
            </a>

            <a href="https://www.facebook.com/parthibdas2023" class="link-card" target="_blank">
                <div class="brand-info">
                    <i data-lucide="facebook"></i>
                    <span class="brand-name">Facebook</span>
                </div>
                <i data-lucide="arrow-up-right" size="20"></i>
            </a>
        </div>

        <footer class="footer">
            PARTHIBDAS.PRO &copy; 2026
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
