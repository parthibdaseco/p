<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib Das | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #60a5fa; /* Modern Blue */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        .container {
            width: 90%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .profile-area {
            margin-bottom: 35px;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #334155);
            margin: 0 auto 15px;
            border: 2px solid var(--accent);
            padding: 5px;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.2);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 300;
        }

        .links {
            display: grid;
            gap: 14px;
        }

        .link-item {
            text-decoration: none;
            color: #f8fafc;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 400;
            transition: all 0.3s ease;
            display: block;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        /* Brand Colors on Hover */
        .fb:hover { color: #1877f2; }
        .yt:hover { color: #ff0000; }
        .lt:hover { color: #39e09b; }

        .footer-text {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="profile-area">
            <div class="profile-pic">
                <img src="https://via.placeholder.com/110" alt="PD" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
            </div>
            <h1>Parthib Das</h1>
            <p class="tagline">Web Developer & Creative Technologist</p>
        </div>

        <div class="links">
            <a href="https://www.facebook.com/parthibdas2023" class="link-item fb" target="_blank">Facebook Profile</a>
            <a href="https://youtube.com/@parthib_2023" class="link-item yt" target="_blank">YouTube Channel</a>
            <a href="http://linktr.ee/parthibdas" class="link-item lt" target="_blank">Linktree Portfolio</a>
        </div>

        <p class="footer-text">© 2026 Parthib Das</p>
    </div>

</body>
</html>
