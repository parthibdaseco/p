<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parthib Das - Portfolio & Quick Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Galada&family=Hind_Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* আপনার আগের CSS এখানে আছে, আমি নিউজ সেকশনের স্টাইল যোগ করেছি */
        :root { --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #0d1b2a; --text-sub: #4a5568; --border-color: #edf2f7; }
        [data-theme="dark"] { --bg-color: #0b132b; --card-bg: #1c2541; --text-main: #f1f5f9; --text-sub: #cbd5e1; --border-color: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 30px; }
        .news-item { border: 1px solid var(--border-color); border-radius: 16px; margin-bottom: 18px; overflow: hidden; background: var(--card-bg); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .news-toggle-header { padding: 20px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .news-collapse-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; padding: 0 18px; }
        .news-item.open .news-collapse-body { max-height: 2000px; padding: 15px 18px; border-top: 1px solid var(--border-color); }
        .news-title-text { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .about-text { font-size: 14px; color: var(--text-sub); line-height: 1.6; text-align: justify; }
        .loading { text-align: center; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="news-list-container" style="width: 100%; max-width: 430px;">
        <div class="loading">Loading...</div>
    </div>

    <script>
        // নিউজ লজিক এখানে যুক্ত করা হলো
        function fetchResearchArticles() {
            const container = document.getElementById('news-list-container');
            const sheetId = '1kad9syTQO71xMH7Aq8YvPpf_ZkeFuYjTFi_yvJcIVFY';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            fetch(url)
                .then(res => res.text())
                .then(text => {
                    const json = JSON.parse(text.substr(47).slice(0, -2));
                    const rows = json.table.rows;
                    let html = '';
                    
                    rows.reverse().forEach((row, index) => {
                        const title = row.c[1]?.v || 'Untitled';
                        const content = row.c[2]?.v || '';
                        const img = row.c[6]?.v || '';
                        
                        html += `
                            <div class="news-item" style="border-left: 5px solid ${['#0072ff', '#da4453', '#11998e'][index % 3]};">
                                <div class="news-toggle-header" onclick="this.parentElement.classList.toggle('open')">
                                    <span class="news-title-text">${title}</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div class="news-collapse-body">
                                    ${img ? `<img src="${img}" style="width:100%; border-radius:10px; margin-bottom:10px;">` : ''}
                                    <p class="about-text">${content}</p>
                                </div>
                            </div>`;
                    });
                    container.innerHTML = html;
                });
        }

        window.onload = function() {
            fetchResearchArticles(); // নিউজ লোড করার ফাংশন কল
            // আপনার বাকি টাইপরাইটার ফাংশন এখানে কল করবেন
        };
    </script>
</body>
</html>
