<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economic Research & Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f3f4f6; --card-bg: #0d1b2a; --accent-color: #c5a880; --text-color: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        .news-item { background: var(--card-bg); color: var(--text-color); margin-bottom: 15px; border-radius: 15px; overflow: hidden; }
        
        /* টাইটেল বাটন স্টাইল */
        .news-header { padding: 20px; cursor: pointer; display: flex; flex-direction: column; }
        .news-date { color: var(--accent-color); font-size: 12px; font-weight: 700; margin-bottom: 5px; }
        h3 { margin: 0; font-family: 'Hind Siliguri', sans-serif; font-size: 17px; }

        /* কন্টেন্ট স্টাইল যা ক্লিক করলে খুলবে */
        .news-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #ffffff; color: #333; }
        .content-inner { padding: 20px; font-family: 'Hind Siliguri', sans-serif; line-height: 1.6; }
        img { width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="news-list">আর্টিকেল লোড হচ্ছে...</div>

<script>
    const SHEET_ID = '1kad9syTQO71xMH7Aq8YvPpf_ZkeFuYjTFi_yvJcIVFY';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function loadData() {
        const res = await fetch(URL);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        const container = document.getElementById('news-list');
        container.innerHTML = '';

        json.table.rows.reverse().forEach(row => {
            const date = row.c[0]?.v || '';
            const title = row.c[1]?.v || '';
            const body = row.c[2]?.v || '';
            const img = row.c[5]?.v || '';

            const item = document.createElement('div');
            item.className = 'news-item';
            item.innerHTML = `
                <div class="news-header" onclick="toggleContent(this)">
                    <span class="news-date">${date}</span>
                    <h3>${title} ▼</h3>
                </div>
                <div class="news-content">
                    <div class="content-inner">
                        <p>${body}</p>
                        ${img ? `<img src="${img}">` : ''}
                    </div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function toggleContent(element) {
        const content = element.nextElementSibling;
        if (content.style.maxHeight) {
            content.style.maxHeight = null;
        } else {
            content.style.maxHeight = content.scrollHeight + "px";
        }
    }

    loadData();
</script>
</body>
</html>
