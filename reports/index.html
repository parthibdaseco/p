<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Economic Research & Insights</title>
    <style>
        .news-item { background: #0d1b2a; color: white; padding: 15px; margin: 10px; border-radius: 10px; }
        .loading { text-align: center; font-family: 'Hind Siliguri', sans-serif; }
    </style>
</head>
<body>

<div id="news-list-container" class="loading">আর্টিকেল লোড হচ্ছে...</div>

<script>
    const SHEET_ID = '1kad9syTQO71xMH7Aq8YvPpf_ZkeFuYjTFi_yvJcIVFY';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    async function fetchNews() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            
            // ডাটা প্রসেসিং
            const rows = data.split('\n');
            const container = document.getElementById('news-list-container');
            container.innerHTML = ''; // লোডিং টেক্সট মুছে ফেলা

            rows.forEach((row, index) => {
                if (index === 0) return; // প্রথম হেডার সারি বাদ দিলাম
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // কমা দিয়ে ভাগ করা
                if (columns.length > 1) {
                    const date = columns[0].replace(/"/g, '');
                    const title = columns[1].replace(/"/g, '');
                    
                    container.innerHTML += `
                        <div class="news-item">
                            <small>${date}</small>
                            <h3>${title}</h3>
                        </div>
                    `;
                }
            });
        } catch (e) {
            document.getElementById('news-list-container').innerHTML = "দুঃখিত, ডাটা লোড হয়নি। আপনার শিটটি কি 'Publish to web' করা আছে?";
            console.error(e);
        }
    }

    fetchNews();
</script>
</body>
</html>
