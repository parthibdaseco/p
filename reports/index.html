<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economic Research & Insights by Parthib Das</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <meta name="description" content="Economics Articles and Research by Parthib Das. Explorer of economic insights, trends, and data analysis.">
    <meta name="keywords" content="Economics Articles, Economic Research, Parthib Economics, Data Analysis">
    <meta name="author" content="Parthib Das">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            gap: 20px;
        }

        .bn-font {
            font-family: 'Hind Siliguri', sans-serif !important;
        }

      
        .back-nav {
            width: 100%;
            max-width: 430px;
            text-align: left;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0d1b2a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #c5a880;
        }

       
        .news-container {
            width: 100%;
            max-width: 430px;
            background: white;
            border-radius: 25px;
            padding: 24px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            position: relative;
        }

        .news-header-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 10px;
            margin-bottom: 18px;
        }

        .news-section-title {
            font-size: 18px;
            color: #0d1b2a;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .news-section-title i {
            color: #c5a880; 
        }

        .lang-switch-btn {
            background: #0d1b2a;
            color: white;
            border: 1px solid #c5a880;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .lang-switch-btn:hover {
            background: #c5a880;
            color: #0d1b2a;
            border-color: #0d1b2a;
        }

        .lang-switch-btn i {
            font-size: 13px;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .news-item {
            background: #ffffff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
            border: 1px solid #eef0f2;
            transition: all 0.3s ease;
        }

        .news-header-btn {
            width: 100%;
            background: linear-gradient(135deg, #0d1b2a, #1b2a4a); 
            color: white;
            border: none;
            padding: 16px;
            text-align: left;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            transition: background 0.3s;
        }

        .news-header-btn:hover {
            background: linear-gradient(135deg, #1b2a4a, #0d1b2a);
        }

        .news-date {
            font-size: 11px;
            color: #c5a880;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .news-headline {
            padding-right: 25px;
            line-height: 1.45;
        }

        .news-header-btn::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease;
            color: #c5a880;
            font-size: 16px;
        }

        .news-item.active .news-header-btn::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .news-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fdfdfd;
        }

        .news-content-inner {
            padding: 18px;
            font-size: 13.5px;
            color: #4a5568;
            line-height: 1.65;
            text-align: justify;
            border-top: 1px solid #eef0f2;
            white-space: pre-line; 
        }

        .loading {
            text-align: center;
            color: #718096;
            font-size: 14px;
            padding: 15px 0;
        }
    </style>
</head>
<body>

    <!-- মেইন পোর্টফোলিওতে ফিরে যাওয়ার বাটন (ঐচ্ছিক) -->
    <div class="back-nav">
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back to Portfolio
        </a>
    </div>

    <!-- রিসার্চ কন্টেইনার -->
    <div class="news-container">
        <div class="news-header-wrapper">
            <div class="news-section-title" id="sec-title">
                <i class="fa-solid fa-microscope"></i> Research & Economic Insights
            </div>
            <button class="lang-switch-btn" onclick="toggleLanguage()">
                <i class="fa-solid fa-earth-americas"></i> <span id="lang-btn-text">বাংলা</span>
            </button>
        </div>
        <div id="news-list-container" class="news-list">
            <div class="loading bn-font" id="loading-msg">আর্টিকেল লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1kad9syTQO71xMH7Aq8YvPpf_ZkeFuYjTFi_yvJcIVFY'; 
        const SHEET_NAME = 'Sheet1'; 

        let allArticles = [];
        let currentLang = 'EN'; 

        function isBengali(text) {
            const banglaRegex = /[\u0980-\u09FF]/;
            return banglaRegex.test(text);
        }

        function toggleLanguage() {
            currentLang = (currentLang === 'EN') ? 'BN' : 'EN';
            document.getElementById('lang-btn-text').innerText = (currentLang === 'EN') ? 'বাংলা' : 'English';
            
            const titleDiv = document.getElementById('sec-title');
            if(currentLang === 'BN') {
                titleDiv.innerHTML = `<i class="fa-solid fa-microscope"></i> অর্থনৈতিক গবেষণা ও প্রবন্ধ`;
                titleDiv.classList.add('bn-font');
            } else {
                titleDiv.innerHTML = `<i class="fa-solid fa-microscope"></i> Research & Economic Insights`;
                titleDiv.classList.remove('bn-font');
            }
            
            renderArticles(); 
        }

        async function fetchNews() {
            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${SHEET_NAME}`;
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                allArticles = []; 

                let arrMatches = [];
                let strDelimiter = ",";
                let objPattern = new RegExp((
                    "(\\" + strDelimiter + "|\\r?\\n|\\r|^)" +
                    "(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|" +
                    "([^\"\\" + strDelimiter + "\\r\\n]*))"
                ), "gi");

                let arrData = [[]];
                let arrMatchesArray = null;

                while (arrMatchesArray = objPattern.exec(csvText)) {
                    let strMatchedDelimiter = arrMatchesArray[1];
                    if (strMatchedDelimiter.length && strMatchedDelimiter !== strDelimiter) {
                        arrData.push([]);
                    }
                    let strMatchedValue;
                    if (arrMatchesArray[2]) {
                        strMatchedValue = arrMatchesArray[2].replace(new RegExp("\"\"", "g"), "\"");
                    } else {
                        strMatchedValue = arrMatchesArray[3];
                    }
                    arrData[arrData.length - 1].push(strMatchedValue);
                }

                for (let i = 1; i < arrData.length; i++) {
                    const row = arrData[i];
                    if (!row || row.length < 3) continue;

                    let dateVal = row[0] || '';
                    let hlBN = row[1] || '';
                    let ctBN = row[2] || '';
                    let hlEN = row[3] || '';
                    let ctEN = row[4] || '';
                    let im1 = row[5] || '';
                    let im2 = row[6] || '';

                    if (dateVal.toLowerCase().includes('date') || (!hlBN && !hlEN)) continue;

                    allArticles.push({
                        date: dateVal,
                        headlineBN: hlBN,
                        contentBN: ctBN,
                        headlineEN: hlEN,
                        contentEN: ctEN,
                        img1: im1,
                        img2: im2
                    });
                }

                renderArticles();

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('news-list-container').innerHTML = '<div class="loading bn-font" style="color:red;">আর্টিকেল লোড করতে সমস্যা হয়েছে! শিটের সেটিংস চেক করুন।</div>';
            }
        }

        function renderArticles() {
            const newsListContainer = document.getElementById('news-list-container');
            newsListContainer.innerHTML = ''; 

            if(allArticles.length === 0) {
                newsListContainer.innerHTML = currentLang === 'BN' ? 
                    '<div class="loading bn-font">কোনো আর্টিকেল পাওয়া যায়নি।</div>' : 
                    '<div class="loading">No articles found.</div>';
                return;
            }

            for (let i = allArticles.length - 1; i >= 0; i--) {
                const art = allArticles[i];
                
                let displayHeadline = currentLang === 'BN' ? art.headlineBN : (art.headlineEN || art.headlineBN);
                let displayContent = currentLang === 'BN' ? art.contentBN : (art.contentEN || art.contentBN);

                const headlineClass = isBengali(displayHeadline) ? 'bn-font' : '';
                const contentClass = isBengali(displayContent) ? 'bn-font' : '';
                const dateClass = isBengali(art.date) ? 'bn-font' : '';

                let imageTag1 = '';
                if (art.img1 && art.img1.trim() !== '') {
                    imageTag1 = `<img src="${art.img1}" alt="Research Image 1" style="width:100%; max-height:220px; object-fit:cover; border-radius:8px; margin-bottom:14px; display:block;">`;
                }

                let imageTag2 = '';
                if (art.img2 && art.img2.trim() !== '') {
                    imageTag2 = `<img src="${art.img2}" alt="Research Image 2" style="width:100%; max-height:220px; object-fit:cover; border-radius:8px; margin-top:14px; display:block;">`;
                }

                const autoKeywords = displayHeadline.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(" ").join(", ");

                const newsItem = document.createElement('div');
                newsItem.className = 'news-item';
                newsItem.setAttribute('data-keywords', autoKeywords);
                
                newsItem.innerHTML = `
                    <button class="news-header-btn" onclick="toggleNews(this)">
                        <span class="news-date ${dateClass}"><i class="fa-regular fa-calendar-days"></i> ${art.date}</span>
                        <h3 class="news-headline ${headlineClass}" style="font-size: 14.5px; font-weight: 600;">${displayHeadline}</h3>
                    </button>
                    <div class="news-content">
                        <div class="news-content-inner ${contentClass}">
                            ${imageTag1}
                            <p>${displayContent}</p>
                            ${imageTag2}
                        </div>
                    </div>
                `;
                
                newsListContainer.appendChild(newsItem);
            }
        }

        function toggleNews(button) {
            const newsItem = button.parentElement;
            const content = button.nextElementSibling;
            
            document.querySelectorAll('.news-item').forEach(item => {
                if (item !== newsItem && item.classList.contains('active')) {
                    item.classList.remove('active');
                    item.querySelector('.news-content').style.maxHeight = null;
                }
            });

            newsItem.classList.toggle('active');
            if (newsItem.classList.contains('active')) {
                content.style.maxHeight = content.scrollHeight + "px";
            } else {
                content.style.maxHeight = null;
            }
        }

        window.onload = fetchNews;
    </script>

</body>
</html>
